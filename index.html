<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The AI PM Digest — AI PM Training Platform</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/lesson.css">
  <link rel="stylesheet" href="css/quiz.css">
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <!-- Ambient background -->
  <div class="ambient-bg"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar__brand" role="button" tabindex="0" onclick="window.location.hash='#/'">
      <div class="sidebar__logo">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="10" fill="url(#logo-grad)"/>
          <line x1="20" y1="18" x2="12" y2="12" stroke="#E7E0D8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
          <line x1="20" y1="18" x2="29" y2="11" stroke="#E7E0D8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
          <line x1="20" y1="18" x2="10" y2="26" stroke="#E7E0D8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
          <line x1="20" y1="18" x2="30" y2="28" stroke="#E7E0D8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
          <line x1="12" y1="12" x2="29" y2="11" stroke="#E7E0D8" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
          <line x1="10" y1="26" x2="30" y2="28" stroke="#E7E0D8" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
          <circle cx="12" cy="12" r="2.5" fill="#E7E0D8" opacity="0.7"/>
          <circle cx="29" cy="11" r="2" fill="#E7E0D8" opacity="0.6"/>
          <circle cx="10" cy="26" r="2" fill="#E7E0D8" opacity="0.6"/>
          <circle cx="30" cy="28" r="2.5" fill="#E7E0D8" opacity="0.7"/>
          <circle cx="20" cy="18" r="4.5" fill="#F0B429" opacity="0.9"/>
          <circle cx="20" cy="18" r="7" fill="#F0B429" opacity="0.12"/>
          <defs>
            <linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40">
              <stop stop-color="#292524"/>
              <stop offset="1" stop-color="#1C1917"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="sidebar__title">
        <span class="sidebar__name">AI PM Digest</span>
        <span class="sidebar__tagline">AI PM Ready</span>
      </div>
    </div>
    <a href="https://www.linkedin.com/in/baptiste-marien/" target="_blank" rel="noopener noreferrer" class="sidebar__linkedin" aria-label="LinkedIn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
    </a>
    <nav id="sidebar-nav" class="sidebar__nav" aria-label="Course navigation"></nav>
    <div class="sidebar__footer">
      <div class="sidebar__progress-summary">
        <div id="sidebar-progress-ring"></div>
        <span id="sidebar-progress-text">0% Complete</span>
        <button id="sidebar-reset-all" class="sidebar__reset-btn" title="Reset all progress">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.75 3.5h10.5M5.25 3.5V2.33a.58.58 0 0 1 .58-.58h2.34a.58.58 0 0 1 .58.58V3.5m1.75 0v8.17a1.17 1.17 0 0 1-1.17 1.16H4.67a1.17 1.17 0 0 1-1.17-1.16V3.5h7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Mobile sidebar toggle -->
  <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </button>

  <!-- Main content -->
  <main id="main-content" class="main">
    <div id="app" class="app-container">
      <!-- Fallback loading state (replaced by JS) -->
      <div style="text-align:center; padding:4rem 2rem; opacity:0.6;">
        <div style="width:24px;height:24px;border:2px solid #44403C;border-top-color:#F0B429;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;"></div>
        <p style="font-family:'Syne',sans-serif;color:#A8A29E;font-size:0.875rem;">Loading AI PM Digest...</p>
        <noscript>
          <p style="color:#E8553A;margin-top:1rem;">JavaScript is required. Please enable it and reload.</p>
        </noscript>
      </div>
    </div>
  </main>

  <!-- Glossary tooltip portal -->
  <div id="glossary-portal" class="glossary-portal"></div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script>
    // Catch module loading errors
    window.addEventListener('error', function(e) {
      console.error('Script error:', e);
      var app = document.getElementById('app');
      if (app && !app.dataset.loaded) {
        app.innerHTML = '<div style="padding:2rem;color:#E8553A;font-family:Syne,sans-serif;">' +
          '<h2>Loading Error</h2>' +
          '<p style="color:#A8A29E;margin-top:0.5rem;">Make sure you\'re serving this via a local server:</p>' +
          '<code style="display:block;margin-top:0.5rem;padding:0.5rem;background:#1C1917;border-radius:6px;color:#F0B429;">npx serve . -p 3000 -s</code>' +
          '<p style="color:#A8A29E;margin-top:0.5rem;">Then open <a href="http://localhost:3000" style="color:#7EB8DA;">http://localhost:3000</a></p>' +
          '</div>';
      }
    });
  </script>
</body>
</html>
